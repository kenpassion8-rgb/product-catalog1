<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bath Mira Industrial Co Ltd — Artisan Soap Catalog</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Raleway:wght@400;500;600;700&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #ffffff;
      font-family: "Raleway", sans-serif;
      color: #1a1814;
    }

    /* ── HEADER ── */
    .header {
      padding: 0 44px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 0.5px solid #e0d9cf;
    }
    .header-company {
      font-family: "Raleway", sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #1a1814;
    }
    .header-email {
      font-family: "Raleway", sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #1a1814;
    }

    /* ── HERO ── */
    .hero {
      text-align: center;
      padding: 56px 40px 44px;
      border-bottom: 0.5px solid #e0d9cf;
    }
    .hero-eyebrow {
      font-family: "Raleway", sans-serif;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #b5a898;
      margin-bottom: 18px;
    }
    .hero-title {
      font-family: "Playfair Display", serif;
      font-weight: 600;
      font-size: 48px;
      line-height: 1.08;
      letter-spacing: 0.01em;
      color: #1a1814;
      margin-bottom: 22px;
    }
    .hero-rule {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .hero-rule-line { width: 40px; height: 0.5px; background: #c8b89a; }
    .hero-rule-diamond {
      width: 5px; height: 5px;
      border: 0.5px solid #c8b89a;
      transform: rotate(45deg);
    }

    /* ── GRID ── */
    .grid-wrap {
      padding: 44px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
    }

    /* ── CARD ── */
    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      border-right: 0.5px solid #e0d9cf;
      border-bottom: 0.5px solid #e0d9cf;
    }
    .card:nth-child(4n) { border-right: none; }

    .card-img-wrap {
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background: #f7f4f0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12%;
    }
    .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      transition: transform 0.6s ease;
    }
    .card:hover .card-img-wrap img {
      transform: scale(1.06);
    }

    .card-label {
      width: 100%;
      text-align: center;
      padding: 14px 8px 16px;
      font-family: "Libre Baskerville", serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: #1a1814;
      border-top: 0.5px solid #e0d9cf;
    }

    /* ── FOOTER ── */
    .footer {
      padding: 18px 44px;
      border-top: 0.5px solid #e0d9cf;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .footer-text {
      font-family: "Raleway", sans-serif;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #b5a898;
    }

    @media (max-width: 800px) {
      .header { padding: 0 20px; }
      .header-company, .header-email { font-size: 11px; }
      .hero { padding: 40px 20px 32px; }
      .hero-title { font-size: 34px; }
      .grid-wrap { padding: 20px; }
      .grid { grid-template-columns: repeat(2, 1fr); }
      .card:nth-child(4n) { border-right: 0.5px solid #e0d9cf; }
      .card:nth-child(2n) { border-right: none; }
      .footer { padding: 14px 20px; flex-direction: column; gap: 6px; text-align: center; }
    }
  </style>
</head>
